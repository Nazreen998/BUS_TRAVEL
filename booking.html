    <div class="container" id="book"><h2>Book Your Ticket</h2>
    <form>
      <label for="from"><i class="arrival.jpg"></i>Boarding</label>
      <select id="from" required>
        <option value="">-- Select City --</option>
        <option>Chennai</option>
        <option>Madurai</option>
        <option>Coimbatore</option>
        <option>Selam</option>
        <option>Tanjore</option>
        <option>Villupuram</option>
        <option>Kanyakumari</option>
      </select>

      <label for="to">Droping</label>
      <select id="to" required>
        <option value="">-- Select City --</option>
        <option>Bangalore</option>
        <option>Hyderabad</option>
        <option>Trichy</option>
        <option>Hosur</option>
        <option>Ooty</option>
        <option>Ernakulam</option>
      </select>

      <label for="date">Date of Journey</label>
      <input type="date" id="date" required>

      <label for="seats">No. of Seats</label>
      <input type="number" id="seats" min="1" max="10" required>
       <lable for="or"> <b>Comfortness</b></lable>
       <select id="or" required>
        <option>A/C</option>
        <option>Non-A/C</option>
       </select>
       <lable for="or"><b>Washroom Facility</b></lable>
       <select id="or" required>
        <option>Yes</option>
        <option>No</option>
       </select> </form>

      <button type="submit"><a href="tanq.html"> Book Now</a> </button>

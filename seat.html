<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seat Booking | Happy Journey</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    nav {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
    }

    .navbar-brand {
      font-weight: bold;
      color: #FFD700 !important;
    }

    .box {
      max-width: 900px;
      margin: 120px auto 40px;
      background: rgba(0,0,0,0.75);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(255,215,0,0.15);
    }

    .route-title {
      color: #FFD700;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }

    .seat {
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: rgba(255,255,255,0.15);
      border: 2px solid transparent;
      transition: 0.2s;
    }

    .seat:hover {
      transform: scale(1.05);
      border: 2px solid #FFD700;
    }

    .seat.selected {
      background: #FFD700;
      color: black;
    }

    .seat.booked {
      background: rgba(255,0,0,0.4);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-custom {
      background: #FFD700;
      color: #000;
      font-weight: 700;
      border-radius: 30px;
      padding: 10px 25px;
      border: none;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #00BFA6;
      color: white;
      transform: scale(1.05);
    }

    .info {
      text-align: center;
      margin-top: 25px;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index1.html">HAPPY JOURNEY</a>

      <div class="ms-auto">
        <a class="btn btn-warning" href="route1.html">Back</a>
      </div>
    </div>
  </nav>

  <div class="box">
    <h2 class="route-title" id="routeName">Seat Selection</h2>

    <div class="text-center mb-3">
      <p>Choose your seats 👇</p>
    </div>

    <div class="seat-grid" id="seatGrid"></div>

    <div class="info">
      <h5>Selected Seats: <span id="selectedSeats">None</span></h5>
      <button class="btn-custom mt-3" id="confirmBtn">Confirm Booking</button>
    </div>
  </div>
<script>
const API = "https://bus-travel-backend.onrender.com";

const token = localStorage.getItem("token");
if (!token) {
  localStorage.setItem("redirectAfterLogin", "seat.html");
  window.location.href = "login1.html";
}

const route = localStorage.getItem("selectedRoute");
document.getElementById("routeName").innerText = `Route: ${route}`;

const seatGrid = document.getElementById("seatGrid");
const selectedSeatsText = document.getElementById("selectedSeats");

let selectedSeats = [];
let bookedSeats = [];

async function loadBookedSeats() {
  const res = await fetch(`${API}/booked-seats/${encodeURIComponent(route)}`);
  const data = await res.json();
  bookedSeats = data.bookedSeats;
  renderSeats();
}

function renderSeats() {
  seatGrid.innerHTML = "";
  selectedSeats = [];
  selectedSeatsText.innerText = "None";

  for (let i = 1; i <= 20; i++) {
    const seat = document.createElement("div");
    seat.classList.add("seat");
    seat.innerText = i;

    if (bookedSeats.includes(i)) {
      seat.classList.add("booked");
    }

    seat.addEventListener("click", () => {
      if (seat.classList.contains("booked")) return;

      if (seat.classList.contains("selected")) {
        seat.classList.remove("selected");
        selectedSeats = selectedSeats.filter(s => s !== i);
      } else {
        seat.classList.add("selected");
        selectedSeats.push(i);
      }

      selectedSeatsText.innerText =
        selectedSeats.length ? selectedSeats.join(", ") : "None";
    });

    seatGrid.appendChild(seat);
  }
}

document.getElementById("confirmBtn").addEventListener("click", async () => {
  if (selectedSeats.length === 0) {
    alert("Seat select pannunga 😅");
    return;
  }

  const username = localStorage.getItem("username");

  const res = await fetch(`${API}/book-seat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username,
      route,
      seats: selectedSeats
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.detail || "Booking failed");
    return;
  }

  localStorage.setItem("bookingId", data.booking_id);

  alert("Booking saved ✅ Payment ku pogalam 💳");
  window.location.href = "payment.html";
});

loadBookedSeats();
</script>
</body>
</html>

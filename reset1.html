<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Happy Journey</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Poppins', sans-serif;
    }
    .box {
      width: 380px;
      background: rgba(0,0,0,0.8);
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(255,215,0,0.2);
    }
    h2 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(90deg, #FFD700, #ffb400);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.02); }
    a { color: #FFD700; text-decoration: none; }
  </style>
</head>

<body>
  <div class="box">
    <h2>Reset Password</h2>

    <form id="resetForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="new_password" placeholder="New Password" required />
      <input type="password" id="confirm_password" placeholder="Confirm Password" required />
      <button type="submit">Reset Password</button>
    </form>

    <p class="mt-3 text-center">
      Back to <a href="login1.html">Login</a>
    </p>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const new_password = document.getElementById("new_password").value;
      const confirm_password = document.getElementById("confirm_password").value;

      if (!username || !new_password || !confirm_password) {
        alert("All fields fill pannu");
        return;
      }

      if (new_password !== confirm_password) {
        alert("Password match aagala");
        return;
      }

      if (new_password.length > 72) {
        alert("Password max 72 characters only");
        return;
      }

      try {
        const res = await fetch(`${API}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, new_password })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.detail || "Reset failed");
          return;
        }

        alert("Password reset success ✅ Now login pannunga");
        window.location.href = "login1.html";

      } catch (err) {
        alert("Backend connect aagala. Server on irukka check pannu.");
        console.error(err);
      }
    });
  </script>
</body>
</html>

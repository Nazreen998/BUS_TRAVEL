<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment | Happy Journey</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 420px;
      background: rgba(0,0,0,0.8);
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(255,215,0,0.15);
      text-align: center;
    }

    h2 {
      color: #FFD700;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .btn-custom {
      background: #FFD700;
      color: black;
      font-weight: bold;
      border-radius: 30px;
      padding: 10px 25px;
      border: none;
      transition: 0.3s;
      width: 100%;
      margin-top: 15px;
    }

    .btn-custom:hover {
      background: #00BFA6;
      color: white;
      transform: scale(1.03);
    }

    .pay-option {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 10px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.2s;
    }

    .pay-option:hover {
      border: 2px solid #FFD700;
    }

    .pay-option.selected {
      border: 2px solid #00BFA6;
      background: rgba(0,191,166,0.2);
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Payment</h2>

    <p id="bookingInfo">Loading booking details...</p>

    <div class="pay-option" data-pay="UPI">📱 UPI</div>
    <div class="pay-option" data-pay="CARD">💳 Card</div>
    <div class="pay-option" data-pay="NETBANKING">🏦 Net Banking</div>

    <button class="btn-custom" id="payBtn">Pay Now</button>

    <p class="mt-3">
      <a href="route1.html" style="color:#FFD700; text-decoration:none;">⬅ Back to Routes</a>
    </p>
  </div>

  <script>
    const API = "https://bus-travel-backend.onrender.com";
    const bookingId = localStorage.getItem("bookingId");
    const route = localStorage.getItem("selectedRoute");
    const username = localStorage.getItem("username");

    if (!bookingId) {
      alert("Booking not found. Please select seats again.");
      window.location.href = "route1.html";
    }

    document.getElementById("bookingInfo").innerText =
      `Booking ID: ${bookingId}\nUser: ${username}\nRoute: ${route}`;

    let selectedPayment = null;

    const options = document.querySelectorAll(".pay-option");
    options.forEach(opt => {
      opt.addEventListener("click", () => {
        options.forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        selectedPayment = opt.getAttribute("data-pay");
      });
    });

    document.getElementById("payBtn").addEventListener("click", () => {
      if (!selectedPayment) {
        alert("Select payment method first 😅");
        return;
      }

      alert(`Payment Success ✅\nMethod: ${selectedPayment}\nBooking: ${bookingId}`);

      // later backend la payment update pannalam
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
